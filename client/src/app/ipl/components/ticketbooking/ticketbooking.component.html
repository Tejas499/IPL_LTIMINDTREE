<div class="ticket-booking-container">
  <h2>Book Tickets</h2>
  <form [formGroup]="ticketBookingForm" (ngSubmit)="onSubmit()">

    <div>
      <label for="email">Email</label>
      <input id="email" formControlName="email" type="email" placeholder="Email" readonly class="readonly-field">
    </div>

    <div>
      <label for="match">Match</label>
      <select formControlName="match">
        <option value="">Select a Match</option>
        <option *ngFor="let match of matches" [ngValue]="match">
          {{ match.firstTeam.teamName }} vs {{ match.secondTeam.teamName }} ({{ match.matchDate | date }})
        </option>
      </select>
      <div *ngIf="ticketBookingForm.get('match')?.invalid && ticketBookingForm.get('match')?.touched" class="error">
        <small>Please select a match.</small>
      </div>
    </div>

    <div>
      <label for="numberOfTickets">Number of Tickets <span class="hint">(max 10)</span></label>
      <input id="numberOfTickets" formControlName="numberOfTickets" type="number" placeholder="Enter number (1-10)" min="1" max="10">
      <div *ngIf="ticketBookingForm.get('numberOfTickets')?.invalid && ticketBookingForm.get('numberOfTickets')?.touched" class="error">
        <small *ngIf="ticketBookingForm.get('numberOfTickets')?.hasError('required')">Number of tickets is required.</small>
        <small *ngIf="ticketBookingForm.get('numberOfTickets')?.hasError('min')">Minimum 1 ticket required.</small>
        <small *ngIf="ticketBookingForm.get('numberOfTickets')?.hasError('max')">Maximum 10 tickets allowed per booking.</small>
      </div>
    </div>

    <button type="submit" [disabled]="ticketBookingForm.invalid">Book Tickets</button>
    <a routerLink="/ipl" class="task-list">Dashboard</a>
  </form>

  <div *ngIf="successMessage" class="success">
    <p>{{ successMessage }}</p>
  </div>
  <div *ngIf="errorMessage" class="error">
    <p>{{ errorMessage }}</p>
  </div>
</div>
